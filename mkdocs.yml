site_name: NetForge Labs
site_description: Learn networking by building it — hands-on, lab-driven courses. Course 1 - VXLAN-EVPN on Juniper.
site_author: etherhtun
repo_url: https://github.com/etherhtun/netforge-labs
repo_name: netforge-labs
edit_uri: edit/main/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Course:
    - Overview: sessions/index.md
    - 1 · Underlay (OSPF): sessions/01-underlay.md
  - Study (quick concepts):
    - Start here: study/index.md
    - 1 · Why VXLAN-EVPN?: study/01-why-vxlan-evpn.md
    - 2 · Underlay vs overlay: study/02-underlay-overlay.md
    - 3 · VXLAN data plane: study/03-vxlan-dataplane.md
    - 4 · EVPN control plane: study/04-evpn-controlplane.md
    - 5 · Route types: study/05-route-types.md
    - 6 · Packet walk: study/06-packet-walk.md
    - Interview questions: study/interview-questions.md
  - Host Setup:
    - GCP Instance: host-setup/00-gcp-instance.md
    - Docker & containerlab: host-setup/01-containerlab.md
  - Labs:
    - Overview: labs.md
  - Reference:
    - Verification Cheatsheet: concepts/verify-cheatsheet.md
    - Team Quickstart: quickstart/intro.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

site_name: NetForge Labs
site_description: Learn networking by building it — hands-on, lab-driven courses. Course 1 - VXLAN-EVPN on Juniper.
site_author: etherhtun

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - "Course 1: VXLAN-EVPN":
    - Overview: sessions/index.md
    - 1 · Underlay (OSPF): sessions/01-underlay.md
    - 2 · Overlay (iBGP-EVPN + RR): sessions/02-overlay-rr.md
    - 3 · L2VNI (stretch a VLAN): sessions/03-l2vni.md
    - "🧪 Lab 01 · Full mesh (sessions 1–3)": labs/lab-01-fullmesh.md
    - "🧪 Lab 02 · Route reflectors (session 2)": labs/lab-02-rr.md
    - 4 · L3VNI & anycast gateway: sessions/04-l3vni-anycast.md
    - "🧪 Lab 03 · L3VNI + anycast GW": labs/lab-03-l3vni.md
    - 5 · Multi-tenancy: sessions/05-multitenancy.md
    - "🧪 Lab 04 · Multi-tenancy": labs/lab-04-multitenancy.md
    - 6 · ESI multihoming: sessions/06-esi-multihoming.md
    - "🧪 Lab 05 · ESI multihoming": labs/lab-05-esi.md
    - 7 · eBGP designs: sessions/07-ebgp.md
    - 8 · External connectivity (L3 out): sessions/08-l3out.md
    - 9 · Multi-site / DCI: sessions/09-multisite.md
    - 10 · Production hardening: sessions/10-production-hardening.md
    - All labs (overview): labs.md
  - Study (quick concepts):
    - Start here: study/index.md
    - 1 · Why VXLAN-EVPN?: study/01-why-vxlan-evpn.md
    - 2 · Underlay vs overlay: study/02-underlay-overlay.md
    - 3 · VXLAN data plane: study/03-vxlan-dataplane.md
    - 4 · EVPN control plane: study/04-evpn-controlplane.md
    - 5 · Route types: study/05-route-types.md
    - 6 · Packet walk: study/06-packet-walk.md
    - Interview questions: study/interview-questions.md
  - Host Setup:
    - GCP Instance: host-setup/00-gcp-instance.md
    - Docker & containerlab: host-setup/01-containerlab.md
  - Reference:
    - IP addressing plan: reference/ipplan.md
    - Validation runbook (drafts): reference/validation-runbook.md
    - Verification Cheatsheet: concepts/verify-cheatsheet.md
    - Team Quickstart: quickstart/intro.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
